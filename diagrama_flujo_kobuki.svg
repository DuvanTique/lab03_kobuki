<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 1000"
     style="background:#ffffff; font-family: Arial, Helvetica, sans-serif;">

  <title>Diagrama de flujo — nodo kobuki_trajectory</title>
  <desc>Flujo completo del nodo ROS para control de trayectorias rectangulares del robot Kobuki</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== NODOS ===== -->

  <!-- 1. INICIO -->
  <rect x="240" y="20" width="200" height="36" rx="18"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="38" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#085041">Inicio del nodo</text>

  <!-- flecha 1→2 -->
  <line x1="340" y1="56" x2="340" y2="84" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Leer parámetros -->
  <rect x="200" y="84" width="280" height="56" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="104" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#26215C">Leer parámetros</text>
  <text x="340" y="124" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#534AB7">largo y ancho de la figura</text>

  <!-- flecha 2→3 -->
  <line x1="340" y1="140" x2="340" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Inicializar nodo ROS -->
  <rect x="200" y="168" width="280" height="56" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="188" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#26215C">Inicializar nodo ROS</text>
  <text x="340" y="208" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#534AB7">Subscriber /odom · Publisher /cmd_vel</text>

  <!-- flecha 3→4 -->
  <line x1="340" y1="224" x2="340" y2="252" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. Esperar /odom -->
  <rect x="200" y="252" width="280" height="56" rx="8"
        fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="272" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#412402">Esperar datos de /odom</text>
  <text x="340" y="292" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#854F0B">odom_received == True?</text>

  <!-- Loop "No" de /odom -->
  <path d="M480 280 L548 280 L548 196 L480 196"
        fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow-amber)"/>
  <text x="564" y="241" text-anchor="start" dominant-baseline="central"
        font-size="12" fill="#854F0B">No</text>

  <!-- flecha 4→5 con "Sí" -->
  <line x1="340" y1="308" x2="340" y2="336" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="324" dominant-baseline="central" font-size="12" fill="#3B6D11">Sí</text>

  <!-- 5. Esperar ENTER -->
  <rect x="200" y="336" width="280" height="56" rx="8"
        fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="356" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#412402">Esperar ENTER del usuario</text>
  <text x="340" y="376" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#854F0B">Confirmar inicio de trayectoria</text>

  <!-- flecha 5→6 -->
  <line x1="340" y1="392" x2="340" y2="420" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. Registrar posición inicial -->
  <rect x="200" y="420" width="280" height="56" rx="8"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="440" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#042C53">Registrar posición inicial</text>
  <text x="340" y="460" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#185FA5">Guardar (x₀, y₀) desde /odom</text>

  <!-- flecha 6→7 -->
  <line x1="340" y1="476" x2="340" y2="504" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. Publicar velocidad lineal -->
  <rect x="200" y="504" width="280" height="44" rx="8"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="526" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#042C53">Publicar velocidad lineal</text>

  <!-- flecha 7→8 -->
  <line x1="340" y1="548" x2="340" y2="576" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8. ¿Distancia >= longitud? -->
  <rect x="200" y="576" width="280" height="56" rx="8"
        fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="596" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#4A1B0C">¿Distancia >= longitud del lado?</text>
  <text x="340" y="616" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#993C1D">sqrt((x-x₀)² + (y-y₀)²) >= dist</text>

  <!-- Loop "No" de distancia -->
  <path d="M480 604 L548 604 L548 526 L480 526"
        fill="none" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow-coral)"/>
  <text x="564" y="567" text-anchor="start" dominant-baseline="central"
        font-size="12" fill="#712B13">No</text>

  <!-- flecha 8→9 con "Sí" -->
  <line x1="340" y1="632" x2="340" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="648" dominant-baseline="central" font-size="12" fill="#3B6D11">Sí</text>

  <!-- 9. Detener y girar 90° -->
  <rect x="200" y="660" width="280" height="56" rx="8"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="680" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#042C53">Detener y girar 90°</text>
  <text x="340" y="700" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#185FA5">Publicar velocidad angular hasta yaw</text>

  <!-- flecha 9→10 -->
  <line x1="340" y1="716" x2="340" y2="744" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 10. ¿4 lados completados? -->
  <rect x="200" y="744" width="280" height="56" rx="8"
        fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="764" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#4A1B0C">¿4 lados completados?</text>
  <text x="340" y="784" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#993C1D">i == len(sides)</text>

  <!-- Loop "No" de 4 lados — sale por la izquierda -->
  <path d="M200 772 L130 772 L130 448 L200 448"
        fill="none" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow-coral)"/>
  <text x="55" y="613" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#712B13">No</text>

  <!-- flecha 10→11 con "Sí" -->
  <line x1="340" y1="800" x2="340" y2="828" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="816" dominant-baseline="central" font-size="12" fill="#3B6D11">Sí</text>

  <!-- 11. Publicar stop -->
  <rect x="200" y="828" width="280" height="44" rx="8"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="850" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#042C53">Publicar velocidad = 0 (stop)</text>

  <!-- flecha 11→FIN -->
  <line x1="340" y1="872" x2="340" y2="900" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 12. FIN -->
  <rect x="240" y="900" width="200" height="36" rx="18"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="918" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#085041">Trayectoria completada</text>

  <!-- ===== LEYENDA ===== -->
  <rect x="40" y="952" width="600" height="36" rx="6"
        fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>

  <rect x="56" y="963" width="14" height="14" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="76" y="972" dominant-baseline="central" font-size="11" fill="#444441">Inicio / Fin</text>

  <rect x="140" y="963" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="160" y="972" dominant-baseline="central" font-size="11" fill="#444441">Configuración</text>

  <rect x="248" y="963" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="268" y="972" dominant-baseline="central" font-size="11" fill="#444441">Espera / decisión</text>

  <rect x="370" y="963" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="390" y="972" dominant-baseline="central" font-size="11" fill="#444441">Acción de movimiento</text>

  <rect x="510" y="963" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="530" y="972" dominant-baseline="central" font-size="11" fill="#444441">Condición</text>

</svg>
